    content="Responsive blog preview card built with semantic HTML and modern CSS, featuring accessible interactions, hover and focus states, and clean component structure.">
  <link rel="canonical" href="https://vimpdev.github.io/fem-17-blog-preview-card/">

  <meta name="theme-color" content="#F4D04E">

  <link rel="preload" href="./assets/fonts/figtree-vf.woff2" as="font" type="font/woff2" crossorigin="anonymous">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://vimpdev.github.io/fem-17-blog-preview-card/">
  <meta property="og:site_name" content="VIMP Frontend Mentor Solutions">
  <meta property="og:title" content="Blog preview card | Frontend Mentor">
  <meta property="og:description"
    content="Responsive blog preview card built with semantic HTML and modern CSS, featuring accessible interactions, hover and focus states, and clean component structure.">
  <meta property="og:image" content="https://vimpdev.github.io/fem-17-blog-preview-card/docs/preview-og.png">
  <meta property="og:image:alt"
    content="Blog preview card showing hover state on title and accessible focus styles on interactive elements">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://vimpdev.github.io/fem-17-blog-preview-card/">
  <meta name="twitter:title" content="Blog preview card | Frontend Mentor">
  <meta name="twitter:description"
    content="Responsive blog preview card built with semantic HTML and modern CSS, featuring accessible interactions, hover and focus states, and clean component structure.">

  <link rel="icon" type="image/png" sizes="32x32" href="./favicon.png">
  <link rel="stylesheet" href="./styles/main.css">

<body>

  <main>
    <h1 class="visually-hidden">Blog preview card</h1>

    <article class="card">
      <img src="./assets/images/illustration-article.svg" alt="Illustration related to HTML and CSS article"
        class="card-media">

      <div>
        <span class="card-category">Learning</span>
        <time datetime="2023-12-21" class="card-date">Published 21 Dec 2023</time>
        <h2 class="card-title">
          <a href="./">HTML & CSS foundations</a>
        </h2>
        <p class="card-description">These languages are the backbone of every website, defining structure, content, and
          presentation.</p>
      </div>

      <footer class="card-footer">
        <img src="./assets/images/image-avatar.webp" alt="" class="card-avatar">
        <p class="card-author">Greg Hooper</p>
      </footer>
    </article>
  </main>

  <footer class="attribution">
    <small>
      Challenge by <a href="https://www.frontendmentor.io/challenges" target="_blank" rel="noopener noreferrer">Frontend
        Mentor</a> &ndash; Coded by <a href="https://www.frontendmentor.io/profile/vimpdev" target="_blank"
        rel="noopener noreferrer">VIMP</a>
    </small>
  </footer>
