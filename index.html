<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Blog preview card</title>

  <link rel="icon" type="image/png" sizes="32x32" href="./favicon.png">
  <link rel="stylesheet" href="./styles/main.css">

</head>

<body>

  <main>
    <h1 class="visually-hidden">Blog preview card</h1>

    <article class="card">
      <img src="./assets/images/illustration-article.svg" alt="Illustration related to HTML and CSS article"
        class="card-media">

      <div>
        <span class="card-category">Learning</span>
        <time datetime="2023-12-21" class="card-date">Published 21 Dec 2023</time>
        <h2 class="card-title">
          <a href="./">HTML & CSS foundations</a>
        </h2>
        <p class="card-description">These languages are the backbone of every website, defining structure, content, and
          presentation.</p>
      </div>

      <footer class="card-footer">
        <img src="./assets/images/image-avatar.webp" alt="" class="card-avatar">
        <p class="card-author">Greg Hooper</p>
      </footer>
    </article>
  </main>

  <footer class="attribution">
    <small>
      Challenge by <a href="https://www.frontendmentor.io/challenges" target="_blank" rel="noopener noreferrer">Frontend
        Mentor</a> &ndash; Coded by <a href="https://www.frontendmentor.io/profile/vimpdev" target="_blank"
        rel="noopener noreferrer">VIMP</a>
    </small>
  </footer>
</body>

</html>
